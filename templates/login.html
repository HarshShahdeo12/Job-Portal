{% extends "base.html" %}
{% block title %}Login | JobPortal{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card card-glass p-4">
      <h3 class="text-white mb-3">Login</h3>

      <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label text-white-50">Login As</label>
          <select name="role" class="form-control" required>
            <option value="candidate">Candidate</option>
            <option value="recruiter">Recruiter</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label text-white-50">Username</label>
          <input class="form-control" type="text" name="username" required>
        </div>

        <div class="mb-3">
          <label class="form-label text-white-50">Password</label>
          <input class="form-control" type="password" name="password" required>
        </div>

        <button class="btn btn-primary w-100" type="submit">Login</button>
      </form>

      <p class="text-white-50 mt-3 mb-0">
        No account? <a href="{% url 'signup' %}">Signup</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
