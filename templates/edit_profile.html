{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <div class="card card-glass p-4">
      <h3 class="text-white mb-4">Edit Profile</h3>

      <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- Full Name -->
        <div class="mb-3">
          <label class="form-label text-white">Full Name</label>
          <input type="text"
                 name="full_name"
                 value="{{ form.full_name.value|default_if_none:'' }}"
                 class="form-control">
        </div>

        <!-- Phone -->
        <div class="mb-3">
          <label class="form-label text-white">Phone</label>
          <input type="text"
                 name="phone"
                 value="{{ form.phone.value|default_if_none:'' }}"
                 class="form-control">
        </div>

        <!-- Skills -->
        <div class="mb-3">
          <label class="form-label text-white">Skills</label>
          <input type="text"
                 name="skills"
                 value="{{ form.skills.value|default_if_none:'' }}"
                 class="form-control">
        </div>


        <!-- Profile Picture -->
        <div class="mb-3">
          <label class="form-label text-white">Profile Picture</label>

          {% if form.instance.profile_pic %}
            <div class="mb-2">
              <img src="{{ form.instance.profile_pic.url }}" alt="Profile"
                  style="width:80px;height:80px;border-radius:50%;object-fit:cover;">
            </div>
          {% endif %}

          <input type="file" name="profile_pic" class="form-control">
        </div>

        <!-- Experience -->
        <div class="mb-3">
          <label class="form-label text-white">Experience</label>
          <textarea name="experience" class="form-control" rows="3">{{ form.experience.value|default_if_none:'' }}</textarea>
        </div>

        <!-- Education -->
        <div class="mb-3">
          <label class="form-label text-white">Education</label>
          <textarea name="education" class="form-control" rows="3">{{ form.education.value|default_if_none:'' }}</textarea>
        </div>

        <!-- LinkedIn -->
        <div class="mb-3">
          <label class="form-label text-white">LinkedIn</label>
          <input type="url" name="linkedin" class="form-control"
                value="{{ form.linkedin.value|default_if_none:'' }}" placeholder="https://linkedin.com/in/yourname">
        </div>
        

        <!-- Resume -->
        <div class="mb-3">
          <label class="form-label text-white">Resume</label>

          {% if form.instance.resume %}
            <div class="mb-2">
              <a href="{{ form.instance.resume.url }}" target="_blank" class="text-info">
                View Current Resume
              </a>
            </div>
          {% endif %}

          <input type="file" name="resume" class="form-control">
        </div>

        <button class="btn btn-primary w-100 mt-3" type="submit">
          Save
        </button>

      </form>

      <p class="mt-3">
        <a href="{% url 'dashboard' %}" class="text-light">
          Back to Dashboard
        </a>
      </p>

    </div>
  </div>
</div>

{% endblock %}
